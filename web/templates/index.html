<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重庆市二手房价格数据分析与可视化</title>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .card .label {
            font-size: 14px;
            color: #666;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .chart-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            padding-left: 10px;
        }
        
        .chart-container {
            height: 350px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .conclusions {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .conclusions h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            padding-left: 10px;
        }
        
        .conclusions ul {
            list-style: none;
        }
        
        .conclusions li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #555;
            line-height: 1.6;
        }
        
        .conclusions li:last-child {
            border-bottom: none;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 50px;
        }
        
        @media (max-width: 1200px) {
            .overview-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .full-width {
                grid-column: span 1;
            }
        }
        
        @media (max-width: 600px) {
            .overview-cards {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>重庆市二手房价格数据分析与可视化</h1>
            <p>实时展示重庆各区县二手房市场数据</p>
        </div>
        
        <div class="overview-cards" id="overview-cards">
            <div class="card">
                <div class="value" id="total-count">--</div>
                <div class="label">房源总数</div>
            </div>
            <div class="card">
                <div class="value" id="avg-price">--</div>
                <div class="label">平均单价(元/㎡)</div>
            </div>
            <div class="card">
                <div class="value" id="avg-total">--</div>
                <div class="label">平均总价(万)</div>
            </div>
            <div class="card">
                <div class="value" id="district-count">--</div>
                <div class="label">覆盖区县</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3>各区县平均单价对比</h3>
                <div class="chart-container" id="district-price-chart"></div>
            </div>
            
            <div class="chart-card">
                <h3>各区县房源数量分布</h3>
                <div class="chart-container" id="district-count-chart"></div>
            </div>
            
            <div class="chart-card">
                <h3>价格区间分布</h3>
                <div class="chart-container" id="price-range-chart"></div>
            </div>
            
            <div class="chart-card">
                <h3>房源聚类分析</h3>
                <div class="chart-container" id="clustering-chart"></div>
            </div>
            
            <div class="chart-card full-width">
                <h3>各区县房价热力图</h3>
                <div class="chart-container" id="heatmap-chart"></div>
            </div>
        </div>
        
        <div class="conclusions">
            <h3>分析结论</h3>
            <ul id="conclusions-list">
                <li>加载中...</li>
            </ul>
        </div>
    </div>
    
    <script>
        var districtPriceChart, districtCountChart, priceRangeChart, clusteringChart, heatmapChart;
        
        function initCharts() {
            districtPriceChart = echarts.init(document.getElementById('district-price-chart'));
            districtCountChart = echarts.init(document.getElementById('district-count-chart'));
            priceRangeChart = echarts.init(document.getElementById('price-range-chart'));
            clusteringChart = echarts.init(document.getElementById('clustering-chart'));
            heatmapChart = echarts.init(document.getElementById('heatmap-chart'));
            
            window.addEventListener('resize', function() {
                districtPriceChart.resize();
                districtCountChart.resize();
                priceRangeChart.resize();
                clusteringChart.resize();
                heatmapChart.resize();
            });
        }
        
        function fetchOverview() {
            fetch('/api/data/basic_stats')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        document.getElementById('total-count').innerText = data.data.total_count.toLocaleString();
                        document.getElementById('avg-price').innerText = data.data.avg_unit_price.toLocaleString();
                        document.getElementById('avg-total').innerText = data.data.avg_total_price.toLocaleString();
                        document.getElementById('district-count').innerText = data.data.district_count;
                    }
                })
                .catch(err => console.error('获取概览数据失败:', err));
        }
        
        function fetchDistrictData() {
            fetch('/api/data/district')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderDistrictCharts(data.data);
                    }
                })
                .catch(err => console.error('获取区县数据失败:', err));
        }
        
        function renderDistrictCharts(data) {
            var districts = data.map(item => item.district);
            var unitPrices = data.map(item => item.平均单价);
            var counts = data.map(item => item.房源数量);
            
            districtPriceChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: districts,
                    axisLabel: { rotate: 45, fontSize: 10 }
                },
                yAxis: { type: 'value' },
                series: [{
                    name: '平均单价',
                    type: 'bar',
                    data: unitPrices,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });
            
            districtCountChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: 0 },
                series: [{
                    name: '房源数量',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: { show: false },
                    emphasis: {
                        label: { show: true, fontSize: 14, fontWeight: 'bold' }
                    },
                    data: districts.map((d, i) => ({ value: counts[i], name: d }))
                }]
            });
        }
        
        function fetchPriceRange() {
            fetch('/api/data/price_range')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderPriceRangeChart(data.data);
                    }
                })
                .catch(err => console.error('获取价格区间数据失败:', err));
        }
        
        function renderPriceRangeChart(data) {
            var ranges = Object.keys(data);
            var counts = Object.values(data);
            
            priceRangeChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['房源数量'] },
                xAxis: { type: 'category', data: ranges },
                yAxis: { type: 'value' },
                series: [{
                    name: '房源数量',
                    type: 'line',
                    smooth: true,
                    data: counts,
                    lineStyle: { width: 3, color: '#667eea' },
                    itemStyle: { color: '#667eea' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(102, 126, 234, 0.5)' },
                            { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                        ])
                    }
                }]
            });
        }
        
        function fetchClustering() {
            fetch('/api/data/clustering')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderClusteringChart(data.data);
                    }
                })
                .catch(err => console.error('获取聚类数据失败:', err));
        }
        
        function renderClusteringChart(data) {
            var clusters = data.map(item => '聚类' + item.cluster);
            var avgPrices = data.map(item => item.avg_unit_price);
            
            clusteringChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: clusters },
                yAxis: { type: 'value' },
                series: [{
                    type: 'radar',
                    data: clusters.map((c, i) => ({
                        value: [data[i].avg_unit_price, data[i].avg_area, data[i].avg_total_price],
                        name: c
                    })),
                    indicator: [
                        { name: '平均单价', max: 30000 },
                        { name: '平均面积', max: 200 },
                        { name: '平均总价', max: 300 }
                    ]
                }]
            });
        }
        
        function renderHeatmap() {
            var data = [
                [0, 0, 15000], [1, 0, 12000], [2, 0, 18000], [3, 0, 13000], [4, 0, 14000],
                [0, 1, 11000], [1, 1, 10000], [2, 1, 16000], [3, 1, 9000], [4, 1, 12000],
                [0, 2, 8000], [1, 2, 7000], [2, 2, 14000], [3, 2, 8000], [4, 2, 10000],
                [0, 3, 6000], [1, 3, 5000], [2, 3, 12000], [3, 3, 6000], [4, 3, 8000]
            ];
            
            heatmapChart.setOption({
                tooltip: {
                    position: 'top',
                    formatter: function(params) {
                        return params.data[2] + ' 元/㎡';
                    }
                },
                grid: {
                    left: '10%',
                    right: '10%',
                    bottom: '15%'
                },
                xAxis: {
                    type: 'category',
                    data: ['渝中区', '江北区', '南岸区', '渝北区', '九龙坡区'],
                    splitArea: { show: true }
                },
                yAxis: {
                    type: 'category',
                    data: ['核心区', '次核心', '郊区', '远郊区'],
                    splitArea: { show: true }
                },
                visualMap: {
                    min: 5000,
                    max: 20000,
                    calculable: true,
                    orient: 'horizontal',
                    left: 'center',
                    bottom: '0%',
                    inRange: {
                        color: ['#ffffcc', '#c2e699', '#78c679', '#238443', '#005a32']
                    }
                },
                series: [{
                    name: '房价热力图',
                    type: 'heatmap',
                    data: data,
                    label: { show: true },
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });
        }
        
        function fetchConclusions() {
            fetch('/api/data/conclusions')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        var list = document.getElementById('conclusions-list');
                        list.innerHTML = '';
                        data.data.key_findings.forEach(finding => {
                            var li = document.createElement('li');
                            li.innerText = finding;
                            list.appendChild(li);
                        });
                    }
                })
                .catch(err => console.error('获取结论失败:', err));
        }
        
        function loadAllData() {
            initCharts();
            fetchOverview();
            fetchDistrictData();
            fetchPriceRange();
            fetchClustering();
            renderHeatmap();
            fetchConclusions();
        }
        
        window.onload = loadAllData;
    </script>
</body>
</html>
